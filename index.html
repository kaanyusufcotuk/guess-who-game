<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Who?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-color: #1a1a2e;
            --card-bg: #30305a;
            --text-color: #ffffff;
            --accent: #ff4757;
            --pixel-border: #000000;
            --highlight: #51e1ed;
        }

        body {
            font-family: 'Press Start 2P', cursive; /* Applied pixel font */
            background-color: var(--bg-color);
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            font-size: 12px; /* Smaller base size because pixel fonts are large */
        }

        h1 {
            margin-bottom: 25px;
        }

        /* Enhanced Mystery Character Display */
        #my-character-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            min-height: 250px; /* Room for the image */
            color: #f1c40f;
            font-weight: bold;
            background: rgba(0, 0, 0, 0);
            border: 6px double #f1c40f;
            border-radius: 0px;
            padding: 10px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        #my-character-display img {
            width: 200px;
            height: 200px;
            border: 4px solid #ffffff;
            border-radius: 0;
            margin-top: 15px;
            margin-bottom: 10px;
            border: 3px solid #f1c40f;
            object-fit: cover;
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        label {
            font-size: 1.1rem;
            font-weight: bold;
        }

        select, button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        select {
            background-color: white;
            color: var(--text-color);
            min-width: 150px;
        }

        button {
            background-color: var(--accent);
            color: white;
            cursor: pointer;
            font-weight: bold;
            padding: 10px 20px;
            transition: background-color 0.2s;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000;
        }

        button:hover {
            background-color: #c0392b;
        }

        .notes-section {
            max-width: 600px;
            margin: 20px auto 30px auto;
            padding: 10px 10px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 20px;
            border-radius: 8px;
            border: none;
            resize: vertical;
            font-family: "Press Start 2P";
            font-size: 1rem;
            box-sizing: border-box;
            background-color: #222;
            line-height: 2;
            letter-spacing: 0.5px;
            color: white;
            border: 4px solid var(--highlight);;
        }

        textarea::placeholder {
            color: #bdc3c7;
        }

        textarea:focus {
            outline: 2px solid #f1c40f;
        }

        button, select, textarea {
            font-family: 'Press Start 2P';
            font-size: 10px;
            border: 3px solid #000;
            border-radius: 0;
            box-shadow: 3px 3px 0px #000;
            text-transform: uppercase;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 10px;
        }

        .card {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 4px solid var(--pixel-border);
            border-radius: 0px;
            padding: 20px;
            cursor: pointer;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            transition: transform 0.2s, opacity 0.2s, filter 0.2s;
            user-select: none;
        }

        .card img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 0;
            border: 3px solid #000;
            background-color: #555;
            margin-bottom: 10px;
        }

        .card h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        .card.eliminated {
            opacity: 0.3;
            filter: grayscale(100%);
            transform: scale(0.95);
            box-shadow: none;
        }

        .card:hover:not(.eliminated) {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .whole {display: flex;}
        
        @media (max-width: 768px){
            .whole{display: block}
        }
    </style>
</head>
<body>
    <h1>THE MOST ORIGINAL GAME EVER:<br><br>GUESS WHO?</h1>
    
    <div class="whole">
        <div style="margin: 30px;">
            <div id="my-character-display">
                <span>Select your mystery character below!</span>
            </div>
            
            <div class="controls">
                <label for="character-select">Your Character:</label>
                <select id="character-select">
                    <option value="">-- Choose --</option>
                </select>
                <button id="reset-btn">Reset Game</button>
            </div>

            <div class="notes-section">
                <textarea id="player-notes" placeholder="Jot down notes here..."></textarea>
            </div>
        </div>
        <div class="board" id="game-board"></div>
    </div>

    <script>
        // KARAKTER RESİMLERİ İSİM VE UZANTILARIYLA BURAYA YAZILACAK
        const imageFiles = [
            "Michael Jackson.png", "Michael Jordan.png", "Shinji İkari.jpg",
            "Bob.jpg", "Asuka Langley.jpeg", "Anime Girl Beamer.webp", "Phineas Flynn.webp",
            "Ferb Flatcher.jpg", "Velt.jpeg", "Velt 2.webp", "Socialist Trio.jpeg", "Big Cheese.jpg",
            "Romance.jpeg", "Mete.jpg", "Puri.png"
        ];

        const characters = imageFiles.map(filename => {
            // Remove extension, replace underscores/hyphens with spaces
            const name = filename.split('.')[0].replace(/[_-]/g, ' ');
            return { 
                name: name, 
                image: `images/${filename}` 
            };
        });

        const boardElement = document.getElementById('game-board');
        const resetBtn = document.getElementById('reset-btn');
        const characterSelect = document.getElementById('character-select');
        const display = document.getElementById('my-character-display');
        const notes = document.getElementById('player-notes');

        function setupDropdown() {
            characterSelect.innerHTML = '<option value="">-- Choose --</option>';
            characters.forEach(char => {
                const option = document.createElement('option');
                option.value = char.name;
                option.textContent = char.name;
                characterSelect.appendChild(option);
            });
        }

        function setupBoard() {
            boardElement.innerHTML = ''; 
            characters.forEach(char => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${char.image}" alt="${char.name}">
                    <h3>${char.name}</h3>
                `;
                card.addEventListener('click', () => {
                    card.classList.toggle('eliminated');
                });
                boardElement.appendChild(card);
            });
        }

        function resetGame() {
            characterSelect.value = '';
            notes.value = '';
            display.innerHTML = '<span>Select your mystery character below!</span>';
            setupBoard(); 
        }

        // UPDATED: Logic to find the image and update the top display
        characterSelect.addEventListener('change', (e) => {
            const selectedName = e.target.value;
            const character = characters.find(c => c.name === selectedName);

            if (character) {
                display.innerHTML = `
                    <span>Your Mystery Character is: ${character.name}</span>
                    <img src="${character.image}" alt="${character.name}">
                `;
            } else {
                display.innerHTML = '<span>Select your mystery character below!</span>';
            }
        });

        resetBtn.addEventListener('click', resetGame);

        setupDropdown();
        setupBoard();
    </script>

</body>
</html>
